name: Sensitive Information Gate

on:
  pull_request_target:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: sensitive-information-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  scan:
    name: trusted sensitive information
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout trusted base revision
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0

      - name: Fetch pull request head object without checkout
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: git fetch --no-tags origin "pull/${PR_NUMBER}/head"

      - name: Run trusted sensitive information regression tests
        run: bash ./scripts/test-sensitive-information-checks.sh

      - name: Scan pull request commits with trusted scanner
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: bash ./scripts/scan-sensitive-changes.sh range "$BASE_SHA" "$HEAD_SHA"

      - name: Scan pull request description and comments
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: bash ./scripts/scan-pull-request-content.sh "$PR_URL"
