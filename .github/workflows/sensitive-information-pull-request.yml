name: Sensitive Information

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: sensitive-information-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  scan:
    name: Scan commits
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout pull request history
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Run sensitive information regression tests
        run: bash ./scripts/test-sensitive-information-checks.sh

      - name: Scan pull request commits
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: bash ./scripts/scan-sensitive-changes.sh range "$BASE_SHA" "$HEAD_SHA"
