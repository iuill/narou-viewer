name: Security Audit

on:
  schedule:
    # Saturday 06:00 JST.
    - cron: "0 21 * * 5"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sensitive-information:
    name: sensitive information history
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository history
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Run sensitive information regression tests
        run: bash ./scripts/test-sensitive-information-checks.sh

      - name: Scan repository history for sensitive information
        run: bash ./scripts/scan-sensitive-changes.sh history

  dependency-audit:
    name: Dependency and toolchain audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: .bun-version

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: .go-version
          cache-dependency-path: services/novel-fetcher/go.sum

      - name: Install dependencies
        id: install_dependencies_for_audit
        run: bun run install:locked

      - name: Audit Bun dependency vulnerabilities
        if: ${{ !cancelled() && steps.install_dependencies_for_audit.outcome == 'success' }}
        run: bun run audit:bun:vulnerabilities

      - name: Verify Go toolchain consistency
        if: ${{ !cancelled() && steps.install_dependencies_for_audit.outcome == 'success' }}
        run: bun run audit:go:toolchain

      - name: Audit Go dependency vulnerabilities
        if: ${{ !cancelled() && steps.install_dependencies_for_audit.outcome == 'success' }}
        run: bun run audit:go:vulnerabilities

      - name: Audit Go module release age
        if: ${{ !cancelled() && steps.install_dependencies_for_audit.outcome == 'success' }}
        run: bun run audit:go:module-age
