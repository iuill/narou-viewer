server {
  listen 80;
  listen [::]:80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /build-info.json {
    add_header Cache-Control "no-store" always;
    try_files /build-info.json =404;
  }

  location = / {
    add_header Cache-Control "no-store" always;
    try_files /index.html =404;
  }

  location = /index.html {
    add_header Cache-Control "no-store" always;
    try_files /index.html =404;
  }

  location = /api {
    return 404;
  }

  location /api/ {
    return 404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
